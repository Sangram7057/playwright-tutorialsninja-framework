name: Playwright Tests

# Run on pushes/PRs to the main branches and on demand.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Framework config consumed by config/env.config.ts (no .env in CI).
env:
  HEADLESS: 'true'
  ACTION_TIMEOUT: '30000'
  NAVIGATION_TIMEOUT: '45000'

jobs:
  # ---------------------------------------------------------------------------
  # Quality gate: types, lint and formatting must pass before any test runs.
  # ---------------------------------------------------------------------------
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # Cross-browser test matrix. Each browser runs in parallel and uploads its
  # own report/artifacts.
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.browser }})
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}

      - name: Install Playwright browser (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: html-report-${{ matrix.browser }}
          path: reports/html-report
          retention-days: 14

      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/allure-results
          retention-days: 14

      - name: Upload JUnit + failure artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.browser }}
          path: |
            reports/junit
            reports/test-artifacts
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Aggregate all browsers' Allure results into a single report.
  # ---------------------------------------------------------------------------
  allure-report:
    name: Publish Allure report
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    # Allow pushing the generated report to the gh-pages branch.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: reports/allure-results
          merge-multiple: true

      # Pull the previous report's history so Allure can render trend graphs.
      - name: Checkout existing gh-pages (for history)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Restore Allure history
        run: |
          mkdir -p reports/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/. reports/allure-results/history/
          fi

      - name: Generate Allure report
        run: npm run report:allure:generate

      - name: Upload Allure report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report
          retention-days: 30

      # Publish to GitHub Pages on pushes to the main branches (not PRs/forks).
      - name: Deploy to GitHub Pages
        if: ${{ github.event_name == 'push' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
          publish_branch: gh-pages
